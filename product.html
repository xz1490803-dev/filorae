<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Filorae</title>
  <meta name="description" content="View product details, materials, care instructions and order on Instagram.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/pages/home.css">
  <link rel="stylesheet" href="css/pages/product.css">
</head>
<body>
  <div class="page-wrapper">
    <main id="main-content">
      <div class="product-page">
        <div class="container" id="product-container">
          <!-- Loading state -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-10);">
            <div class="skeleton" style="aspect-ratio:1;border-radius:var(--radius-xl);"></div>
            <div>
              <div class="skeleton skeleton-text" style="width:30%;"></div>
              <div class="skeleton skeleton-title" style="margin-top:var(--space-4);"></div>
              <div class="skeleton skeleton-text" style="width:40%;margin-top:var(--space-4);"></div>
              <div class="skeleton skeleton-text" style="width:50%;margin-top:var(--space-2);"></div>
              <div class="skeleton" style="height:48px;margin-top:var(--space-8);border-radius:var(--radius-xl);"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="js/pages/product.js"></script>
</body>
</html>
