<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Filorae</title>
  <meta name="description" content="Get in touch with Filorae. We'd love to hear from you about custom orders, collaborations, or just to say hi!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/pages/home.css">
  <link rel="stylesheet" href="css/pages/about.css">
</head>
<body>
  <div class="page-wrapper">
    <main id="main-content" class="contact-page">
      <section class="section-lg">
        <div class="container">
          <div class="section-header" style="margin-bottom:var(--space-10);">
            <span class="section-subtitle">Get in Touch</span>
            <h1 class="section-title">Contact Us</h1>
            <p class="section-desc">Have a question or want a custom order? We'd love to hear from you!</p>
          </div>

          <div class="contact-layout">
            <div class="contact-info animate-on-scroll fade-up">
              <div class="contact-info-card">
                <div class="contact-info-card__icon"><svg xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-instagram"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg></div>
                <div>
                  <h4>Instagram</h4>
                  <p>@_filorae_ — DM us anytime!</p>
                </div>
              </div>
              <div class="contact-info-card">
                <div class="contact-info-card__icon"><i data-lucide="mail" style="width:20px;height:20px;"></i></div>
                <div>
                  <h4>Email</h4>
                  <p>hello@filorae.com</p>
                </div>
              </div>
              <div class="contact-info-card">
                <div class="contact-info-card__icon"><i data-lucide="clock" style="width:20px;height:20px;"></i></div>
                <div>
                  <h4>Response Time</h4>
                  <p>We usually respond within 24 hours</p>
                </div>
              </div>
              <div class="contact-info-card">
                <div class="contact-info-card__icon"><i data-lucide="map-pin" style="width:20px;height:20px;"></i></div>
                <div>
                  <h4>Location</h4>
                  <p>India 🇮🇳</p>
                </div>
              </div>
            </div>

            <div class="contact-form-card animate-on-scroll fade-up">
              <h3 style="font-family:var(--font-heading);font-size:var(--text-xl);margin-bottom:var(--space-6);">Send us a Message</h3>
              <form class="contact-form" id="contact-form">
                <div class="contact-form__row">
                  <div class="input-group">
                    <label class="input-label" for="contact-name">Name</label>
                    <input type="text" id="contact-name" name="name" class="input-field" placeholder="Your name" required>
                  </div>
                  <div class="input-group">
                    <label class="input-label" for="contact-email">Email</label>
                    <input type="email" id="contact-email" name="email" class="input-field" placeholder="you@example.com" required>
                  </div>
                </div>
                <div class="input-group">
                  <label class="input-label" for="contact-subject">Subject</label>
                  <select id="contact-subject" name="subject" class="input-field select-field">
                    <option value="General Inquiry">General Inquiry</option>
                    <option value="Order Status">Order Status</option>
                    <option value="Custom Order">Custom Order</option>
                    <option value="Feedback">Feedback</option>
                  </select>
                </div>
                <div class="input-group">
                  <label class="input-label" for="contact-message">Message</label>
                  <textarea id="contact-message" name="message" class="input-field" rows="5" placeholder="Tell us how we can help..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">
                  <i data-lucide="send" style="width:16px;height:16px;"></i>
                  Send Message
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script type="module">
    import { initApp } from './js/app.js';
    import { showToast } from './components/toast.js';
    initApp();

    document.getElementById('contact-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      
      try {
        btn.innerHTML = '<i data-lucide="loader" style="width:16px;height:16px;animation:spin 2s linear infinite"></i> Sending...';
        btn.disabled = true;
        if (window.lucide) window.lucide.createIcons();

        const formData = new FormData(form);
        // Important: _captcha = false disables the visual captcha
        formData.append('_captcha', 'false');

        const response = await fetch('https://formsubmit.co/ajax/filorae6@gmail.com', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (response.ok && data.success) {
          showToast('Message sent! ♥', 'success');
          form.reset();
        } else {
          showToast(data.message || 'Something went wrong.', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('Error sending message. Please try again.', 'error');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
        if (window.lucide) window.lucide.createIcons();
      }
    });
  </script>
</body>
</html>
