<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Filorae</title>
  <meta name="description" content="Sign in to your Filorae account to manage your wishlist and profile.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <a href="index.html">filörae</a>
          <span class="tagline">♥ handmade with love ♥</span>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login">Sign In</button>
          <button class="auth-tab" id="tab-register">Create Account</button>
        </div>

        <div id="auth-forms">
          <!-- Social Login -->
          <div class="social-login" style="margin-bottom:var(--space-5);">
            <button class="social-btn google-signin-btn">
              <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.1 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C33.9 5.8 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.8 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C33.9 5.8 29.2 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5 0 9.5-1.7 13.1-4.5l-6-5.2C29.1 35.9 26.7 36 24 36c-5.3 0-9.8-3-11.2-7.2l-6.5 5C9.5 40 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.4l6 5.2C36.6 39.2 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
              Continue with Google
            </button>
          </div>

          <div class="auth-divider">or</div>

          <!-- Login Form -->
          <form class="auth-form active" id="login-form" style="margin-top:var(--space-5);">
            <div class="input-group">
              <label class="input-label" for="login-email">Email</label>
              <input type="email" id="login-email" class="input-field" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="input-group">
              <label class="input-label" for="login-password">Password</label>
              <div class="password-wrap">
                <input type="password" id="login-password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <i data-lucide="eye" style="width:18px;height:18px;"></i>
                </button>
              </div>
            </div>
            <div class="auth-options">
              <div class="checkbox-group">
                <input type="checkbox" id="remember-me">
                <label class="checkbox-label" for="remember-me">Remember me</label>
              </div>
              <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
          </form>

          <!-- Register Form -->
          <form class="auth-form" id="register-form" style="margin-top:var(--space-5);">
            <div class="input-group">
              <label class="input-label" for="register-name">Full Name</label>
              <input type="text" id="register-name" class="input-field" placeholder="Your name" required autocomplete="name">
            </div>
            <div class="input-group">
              <label class="input-label" for="register-email">Email</label>
              <input type="email" id="register-email" class="input-field" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="input-group">
              <label class="input-label" for="register-password">Password</label>
              <div class="password-wrap">
                <input type="password" id="register-password" class="input-field" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <i data-lucide="eye" style="width:18px;height:18px;"></i>
                </button>
              </div>
            </div>
            <div class="input-group">
              <label class="input-label" for="register-confirm">Confirm Password</label>
              <div class="password-wrap">
                <input type="password" id="register-confirm" class="input-field" placeholder="Confirm your password" required autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <i data-lucide="eye" style="width:18px;height:18px;"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
          </form>
        </div>

        <!-- Forgot Password Panel -->
        <div id="forgot-panel" class="forgot-panel">
          <button class="forgot-panel__back" id="forgot-back">
            <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
            Back to Sign In
          </button>
          <h2>Reset Password</h2>
          <p>Enter your email and we'll send you a link to reset your password.</p>
          <form id="forgot-form" style="display:flex;flex-direction:column;gap:var(--space-5);">
            <div class="input-group">
              <label class="input-label" for="forgot-email">Email</label>
              <input type="email" id="forgot-email" class="input-field" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Send Reset Link</button>
          </form>
        </div>
      </div>

      <!-- Back to home -->
      <div class="auth-back">
        <a href="index.html">
          <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
          Back to Filorae
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="js/pages/auth.js"></script>
</body>
</html>
